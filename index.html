<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Idle Miner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="resource">
      <span class="resource-icon">🪙</span>
      <div class="resource-text">
        <span id="gold-amount">0</span>
        <span id="gold-rate">+0/сек</span>
      </div>
    </div>
    <div class="resource resource-gems">
      <span class="resource-icon">💎</span>
      <div class="resource-text">
        <span id="gems-amount">0</span>
        <span class="resource-sub">престиж</span>
      </div>
    </div>
  </header>

  <main id="view-mine" class="view active">
    <div class="mine-stage">
      <div id="ore-rock" class="ore-rock">⛏️<div class="rock-emoji">🪨</div></div>
      <div id="float-layer" class="float-layer"></div>
    </div>
    <div class="click-power">Сила удара: <span id="click-power">1</span> за клик</div>
    <button id="boost-btn" class="boost-btn">🚀 Реклама: ×2 добыча на 30 мин</button>
  </main>

  <main id="view-shop" class="view">
    <div class="section-title">Наём и техника</div>
    <div id="miners-list" class="list"></div>
    <div class="section-title section-title-auto">Автокликеры 🤡</div>
    <div class="section-hint">Тыкают руду вместо тебя. Сила клика из «Улучшений» усиливает и их.</div>
    <div id="auto-list" class="list"></div>
  </main>

  <main id="view-upgrades" class="view">
    <div class="section-title">Улучшения</div>
    <div id="upgrades-list" class="list"></div>
  </main>

  <main id="view-stats" class="view">
    <div class="section-title">Статистика</div>
    <div class="stats-box" id="stats-box"></div>
    <button id="prestige-btn" class="prestige-btn">Перезапустить шахту 💎</button>
    <div class="prestige-hint">Сбрасывает золото и технику, но даёт кристаллы, которые навсегда ускоряют добычу.</div>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-view="view-mine"><span>⛏️</span>Добыча</button>
    <button class="tab" data-view="view-shop"><span>🏗️</span>Наём</button>
    <button class="tab" data-view="view-upgrades"><span>⚡</span>Улучшения</button>
    <button class="tab" data-view="view-stats"><span>📊</span>Статистика</button>
  </nav>
</div>

<div id="offline-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-title">С возвращением!</div>
    <div class="modal-body" id="offline-text"></div>
    <button id="offline-close" class="modal-btn">Забрать</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
